{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Email Sent</h4>
            </div>
            <div class="card-body text-center">
                <div class="mb-4">
                    <i class="fas fa-envelope-open-text" style="font-size: 48px; color: #28a745;"></i>
                </div>
                <p>We've emailed you instructions for setting your password.</p>
                <p class="text-muted">
                    If you don't receive an email, please make sure you've entered 
                    the address you registered with.
                </p>
                <hr>
                <a href="{% url 'login' %}" class="btn btn-primary">Return to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
